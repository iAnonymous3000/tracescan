name: CI

# Actions are pinned to commit SHAs (dependabot proposes bumps), the Rust
# toolchain comes from rust-toolchain.toml, and wasm-pack is pinned by
# version: no floating dependency can silently change what ships.
on:
  push:
    branches: [main]
  pull_request:

# CI only reads the repository; nothing here needs write access.
permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (pinned by rust-toolchain.toml)
        run: rustup toolchain install

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Install wasm-pack
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: wasm-pack@0.14.0

      - name: Build WASM module
        run: TRACE_BUILD_COMMIT="${{ github.sha }}" wasm-pack build crates/trace-core --target web --release --out-dir ../../web/pkg

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install cargo-audit
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust (pinned by rust-toolchain.toml)
        run: rustup toolchain install

      - name: Install wasm-pack
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: wasm-pack@0.14.0

      - name: Build WASM module
        run: TRACE_BUILD_COMMIT="${{ github.sha }}" wasm-pack build crates/trace-core --target web --release --out-dir ../../web/pkg

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
        working-directory: e2e

      - name: Run browser E2E tests
        run: npx playwright test
        working-directory: e2e
