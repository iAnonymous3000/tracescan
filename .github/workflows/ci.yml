name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown

      - name: Run tests
        run: cargo test

      - name: Install wasm-pack
        run: curl -sSf https://drager.github.io/wasm-pack/installer/init.sh | sh

      - name: Build WASM module
        run: wasm-pack build crates/trace-core --target web --release --out-dir ../../web/pkg
