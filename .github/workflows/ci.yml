name: CI

# Actions are pinned to commit SHAs (dependabot proposes bumps), the Rust
# toolchain comes from rust-toolchain.toml, and wasm-pack is pinned by
# version: no floating dependency can silently change what ships.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust (pinned by rust-toolchain.toml)
        run: rustup toolchain install

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test

      - name: Install wasm-pack
        uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # v2.82.10
        with:
          tool: wasm-pack@0.14.0

      - name: Build WASM module
        run: wasm-pack build crates/trace-core --target web --release --out-dir ../../web/pkg

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install cargo-audit
        uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # v2.82.10
        with:
          tool: cargo-audit

      - name: Audit dependencies
        run: cargo audit

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install Rust (pinned by rust-toolchain.toml)
        run: rustup toolchain install

      - name: Install wasm-pack
        uses: taiki-e/install-action@50414676f9f5d50a65992c6dd2ed02641263226c # v2.82.10
        with:
          tool: wasm-pack@0.14.0

      - name: Build WASM module
        run: wasm-pack build crates/trace-core --target web --release --out-dir ../../web/pkg

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: e2e/package-lock.json

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit
        working-directory: e2e

      - name: Run browser E2E tests
        run: npx playwright test
        working-directory: e2e
