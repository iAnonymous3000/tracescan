name: Deploy production

# CI-gated production deploys: builds the exact commit CI validated and
# uploads it to Cloudflare Pages as one immutable artifact, then verifies
# selected invariants of what production serves. This closes the race where
# the Pages git integration builds a push to main before (or despite) CI.
#
# This is the active production path. Its external configuration invariants:
#   1. CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets exist.
#   2. PRODUCTION_DEPLOY_REQUIRED is true, so either secret disappearing fails.
#   3. Cloudflare Pages automatic deployments are disabled while the repository
#      may remain linked.
# Re-check those settings after recreating the Pages project or changing the
# repository/account connection; they cannot be enforced by this file alone.
#
# Deploys refuse to run unless the validated commit is still the tip of
# main, checked once up front and again immediately before the upload:
# CI runs can finish out of order (a newer push's CI completing before an
# older one's), and without the guard the later-finishing older run would
# roll production backward - and then "verify" its own stale commit.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    # Job-level, not workflow-level: runs skipped by the `if` above
    # (failed-CI events) never enter the group. queue: max, because the
    # default single pending slot *replaces* the pending run when a new
    # one arrives - an older commit's late CI completion would evict the
    # newest commit's queued deploy, and with the stale-guard below the
    # evictor then skips itself, leaving the newest green commit
    # undeployed forever. The extended queue preserves admitted runs (up
    # to GitHub's 100-run limit); stale ones drain as fast no-op skips.
    concurrency:
      group: production-deploy
      cancel-in-progress: false
      queue: max
    env:
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      # The Cloudflare secrets are exposed only to this step (which reads
      # their presence, nothing else) and the deploy step that hands them
      # to wrangler - never to checkout, toolchain installers, or builds.
      - name: Preflight (credentials and freshness)
        id: pre
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DEPLOY_REQUIRED: ${{ vars.PRODUCTION_DEPLOY_REQUIRED }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            if [ "$DEPLOY_REQUIRED" = "true" ]; then
              echo "PRODUCTION_DEPLOY_REQUIRED is set but the Cloudflare secrets are missing: production is no longer being deployed." >&2
              exit 1
            fi
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets not configured; skipping CI-gated deploy."
            exit 0
          fi
          tip=$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | cut -f1)
          if [ "$tip" != "$HEAD_SHA" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "main is now at ${tip}; not deploying stale ${HEAD_SHA} (its own deploy run handles it)."
            exit 0
          fi
          echo "deploy=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.pre.outputs.deploy == 'true'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rust (pinned by rust-toolchain.toml)
        if: steps.pre.outputs.deploy == 'true'
        run: rustup toolchain install

      - name: Install wasm-pack
        if: steps.pre.outputs.deploy == 'true'
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: wasm-pack@0.14.0

      - name: Build the deployable artifact
        if: steps.pre.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          # Reports embed the exact commit they were built from
          # (tool.build_commit); version alone cannot identify an untagged
          # production build.
          export TRACE_BUILD_COMMIT="$HEAD_SHA"
          wasm-pack build crates/trace-core --target web --release --out-dir ../../web/pkg -- --locked
          rm -f web/pkg/.gitignore web/pkg/package.json web/pkg/*.d.ts
          sed -i "s/const CACHE = 'trace-v1'/const CACHE = 'trace-${HEAD_SHA}'/" web/sw.js
          grep -q "trace-${HEAD_SHA}" web/sw.js

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.pre.outputs.deploy == 'true'
        with:
          node-version: 22

      # Installed from the committed lockfile, and before any step holds
      # the production token: transitive npm resolution never runs with
      # credentials in the environment.
      - name: Install wrangler (pinned by deploy/package-lock.json)
        if: steps.pre.outputs.deploy == 'true'
        working-directory: deploy
        run: npm ci

      - name: Deploy to Cloudflare Pages
        if: steps.pre.outputs.deploy == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          # Re-check at the last moment: the build above takes minutes, and
          # main may have moved since preflight. Failing here is correct -
          # the newer commit's own deploy run (queued behind this one by the
          # concurrency group) brings production forward.
          tip=$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | cut -f1)
          if [ "$tip" != "$HEAD_SHA" ]; then
            echo "main moved to ${tip} during the build; refusing to deploy stale ${HEAD_SHA}." >&2
            exit 1
          fi
          ./deploy/node_modules/.bin/wrangler pages deploy web --project-name tracescan --branch main --commit-hash "$HEAD_SHA"

      - name: Verify production serves this commit
        if: steps.pre.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          headers=$(mktemp)
          live_dir=$(mktemp -d)
          trap 'rm -f "$headers"; rm -rf "$live_dir"' EXIT
          expected_csp=$(sed -n 's/^  Content-Security-Policy: //p' web/_headers)
          expected_permissions_policy=$(sed -n 's/^  Permissions-Policy: //p' web/_headers)
          [ -n "$expected_csp" ]
          [ -n "$expected_permissions_policy" ]

          verify_production() {
            live_sw="$live_dir/sw.js"
            # Use the bare URLs a normal client and service worker request.
            # A cache-busted query could bypass a stale per-key edge entry and
            # falsely bless bytes that the browser would not actually persist.
            curl -fsSL "https://tracescan.pages.dev/sw.js" > "$live_sw" || return 1
            live=$(grep -o "trace-[0-9a-f]\{40\}" "$live_sw" || true)
            [ "$live" = "trace-${HEAD_SHA}" ] || return 1
            cmp -s "$live_sw" web/sw.js || return 1
            curl -fsSI "https://tracescan.pages.dev/" > "$headers" || return 1
            grep -Fqi "content-security-policy: ${expected_csp}" "$headers" || return 1
            grep -Fqi "permissions-policy: ${expected_permissions_policy}" "$headers" || return 1
            grep -Eqi '^cross-origin-opener-policy:[[:space:]]*same-origin([[:space:]]|$)' "$headers" || return 1
            grep -Eqi '^x-content-type-options:[[:space:]]*nosniff([[:space:]]|$)' "$headers" || return 1
            grep -Eqi '^referrer-policy:[[:space:]]*no-referrer([[:space:]]|$)' "$headers" || return 1
            curl -fsSL "https://tracescan.pages.dev/" > "$live_dir/root.html" || return 1
            cmp -s "$live_dir/root.html" web/index.html || return 1
            # Verify every scanner asset the new service worker will persist.
            # Per-file edge-cache skew must not let a coherent old manifest and
            # IOC bundle, or mixed JS/WASM generations, pass this deploy gate.
            for asset in \
              index.html style.css main.js readable-report.js report-validator.js \
              indicator-floor.js worker.js report.schema.json \
              pkg/trace_core.js pkg/trace_core_bg.wasm iocs/manifest.json \
              iocs/pegasus.stix2 iocs/predator.stix2 iocs/kingspawn.stix2 \
              iocs/triangulation.stix2 iocs/rcs.stix2 iocs/wintego_helios.stix2 \
              iocs/coruna.stix2 iocs/darksword.stix2 \
              fixtures/sysdiagnose_demo_clean.tar.gz \
              fixtures/sysdiagnose_demo_infected.tar.gz
            do
              live_asset="$live_dir/${asset//\//_}"
              # Follow redirects just as fetch()/Cache.addAll() do. Cloudflare
              # normally redirects /index.html to /; comparing the redirect
              # response body would never validate what the browser caches.
              curl -fsSL "https://tracescan.pages.dev/${asset}" \
                > "$live_asset" || return 1
              cmp -s "$live_asset" "web/$asset" || return 1
            done
            # The report schema must resolve at its declared $id, not fall
            # back to the SPA's index.html.
            jq -e --arg schema_id 'https://tracescan.pages.dev/report.schema.json' \
              '.["$id"] == $schema_id and .properties.schema_version.const == 4' \
              "$live_dir/report.schema.json" > /dev/null || return 1
          }

          verified=false
          for attempt in $(seq 1 20); do
            if verify_production; then
              verified=true
              break
            fi
            echo "production verification attempt ${attempt}/20 did not yet observe the complete validated artifact"
            [ "$attempt" -eq 20 ] || sleep 15
          done
          [ "$verified" = true ] || {
            echo "production did not converge to the complete validated artifact; last service-worker marker was ${live:-unknown}" >&2
            exit 1
          }
          echo "production verified at trace-${HEAD_SHA}"
