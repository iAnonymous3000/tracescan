name: Deploy production

# CI-gated production deploys: builds the exact commit CI validated and
# uploads it to Cloudflare Pages as one immutable artifact, then verifies
# what production actually serves. This closes the race where the Pages
# git integration builds a push to main before (or despite) CI.
#
# Inert until the repository has the CLOUDFLARE_API_TOKEN and
# CLOUDFLARE_ACCOUNT_ID secrets. Cutover:
#   1. Create a Pages API token (Cloudflare dashboard -> My Profile ->
#      API Tokens -> "Cloudflare Pages: Edit") and add both secrets
#      (Settings -> Secrets and variables -> Actions).
#   2. Confirm one green run of this workflow deploys successfully.
#   3. Disconnect the git integration on the Pages project so this
#      workflow is the only deploy path.
#
# Deploys refuse to run unless the validated commit is still the tip of
# main, checked once up front and again immediately before the upload:
# CI runs can finish out of order (a newer push's CI completing before an
# older one's), and without the guard the later-finishing older run would
# roll production backward - and then "verify" its own stale commit.
# Concurrency serializes deploys so the guard cannot be raced mid-build.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Preflight (credentials and freshness)
        id: pre
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets not configured; skipping CI-gated deploy."
            exit 0
          fi
          tip=$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | cut -f1)
          if [ "$tip" != "$HEAD_SHA" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "main is now at ${tip}; not deploying stale ${HEAD_SHA} (its own deploy run handles it)."
            exit 0
          fi
          echo "deploy=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.pre.outputs.deploy == 'true'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rust (pinned by rust-toolchain.toml)
        if: steps.pre.outputs.deploy == 'true'
        run: rustup toolchain install

      - name: Install wasm-pack
        if: steps.pre.outputs.deploy == 'true'
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          tool: wasm-pack@0.14.0

      - name: Build the deployable artifact
        if: steps.pre.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          wasm-pack build crates/trace-core --target web --release --out-dir ../../web/pkg
          rm -f web/pkg/.gitignore web/pkg/package.json web/pkg/*.d.ts
          sed -i "s/const CACHE = 'trace-v1'/const CACHE = 'trace-${HEAD_SHA}'/" web/sw.js
          grep -q "trace-${HEAD_SHA}" web/sw.js

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: steps.pre.outputs.deploy == 'true'
        with:
          node-version: 22

      - name: Deploy to Cloudflare Pages
        if: steps.pre.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          # Re-check at the last moment: the build above takes minutes, and
          # main may have moved since preflight. Failing here is correct -
          # the newer commit's own deploy run (queued behind this one by the
          # concurrency group) brings production forward.
          tip=$(git ls-remote "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | cut -f1)
          if [ "$tip" != "$HEAD_SHA" ]; then
            echo "main moved to ${tip} during the build; refusing to deploy stale ${HEAD_SHA}." >&2
            exit 1
          fi
          npx --yes wrangler@4.110.0 pages deploy web --project-name tracescan --branch main --commit-hash "$HEAD_SHA"

      - name: Verify production serves this commit
        if: steps.pre.outputs.deploy == 'true'
        run: |
          set -euo pipefail
          for i in $(seq 1 20); do
            live=$(curl -fsS "https://tracescan.pages.dev/sw.js" | grep -o "trace-[0-9a-f]\{40\}" || true)
            [ "$live" = "trace-${HEAD_SHA}" ] && break
            sleep 15
          done
          [ "$live" = "trace-${HEAD_SHA}" ] || { echo "production still serves ${live:-unknown}"; exit 1; }
          curl -fsSI "https://tracescan.pages.dev/" | grep -qi "^content-security-policy:"
          curl -fsS -o /dev/null "https://tracescan.pages.dev/fixtures/sysdiagnose_demo_clean.tar.gz"
          curl -fsS -o /dev/null "https://tracescan.pages.dev/fixtures/sysdiagnose_demo_infected.tar.gz"
          echo "production verified at trace-${HEAD_SHA}"
