name: Deploy

# Publishing is gated on the full CI gate (fmt, clippy, tests, audit,
# browser E2E): this workflow only runs after a CI run on main concludes,
# and the job condition requires that run to have succeeded. The manual
# dispatch escape hatch still exists for redeploys of a known-good main.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy exactly the commit CI validated, not whatever main
          # points at by the time this workflow runs.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl -sSf https://drager.github.io/wasm-pack/installer/init.sh | sh

      - name: Build WASM module
        run: wasm-pack build crates/trace-core --target web --release --out-dir ../../web/pkg

      - name: Drop build metadata from the site artifact
        run: rm -f web/pkg/.gitignore web/pkg/package.json web/pkg/*.d.ts

      - name: Version the service worker cache per deploy
        run: |
          SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          sed -i "s/const CACHE = 'trace-v1'/const CACHE = 'trace-${SHA:0:8}'/" web/sw.js
          grep "const CACHE" web/sw.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - id: deployment
        uses: actions/deploy-pages@v4
