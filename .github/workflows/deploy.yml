name: Deploy Pages redirect

# Production moved to Cloudflare Pages (https://tracescan.pages.dev), which
# builds from main via its git integration and enforces web/_headers for
# real (CSP, COOP, nosniff - GitHub Pages could never send them). This
# workflow keeps the old GitHub Pages origin alive as a redirect only:
# returning visitors still have the old app cached by its service worker,
# so redirect/sw.js ships a kill switch that clears those caches and
# unregisters before sending them on. Leave this deployed indefinitely.
on:
  push:
    branches: [main]
    paths:
      - 'redirect/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-redirect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: redirect

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
