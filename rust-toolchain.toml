# Pins the exact compiler for every environment that builds Trace: CI, the
# CI-gated production deployment, and local checkouts. This prevents toolchain
# drift from silently changing or breaking a release build. A pinned compiler
# is necessary for reproducibility, but is not by itself a reproducible-build
# attestation. Bump deliberately and review the resulting artifacts.
[toolchain]
channel = "1.96.1"
components = ["rustfmt", "clippy"]
targets = ["wasm32-unknown-unknown"]
